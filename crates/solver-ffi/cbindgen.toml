# cbindgen config for solver-ffi.
#
# Regenerated automatically by crates/solver-ffi/build.rs on every build.
# Do not hand-edit include/solver.h — edit lib.rs instead and rebuild.

language = "C"
cpp_compat = true

# Include guard. Matches the conventional style of C headers; uppercase
# snake_case of the filename, with an _H suffix, plus repo-scoped prefix
# so it won't collide with any other "solver.h" on the consumer's include
# path.
include_guard = "POKER_SOLVER_FFI_H"

# Prepended above the include guard. This is what a reader (or a Swift
# engineer on the Poker Panel side) will see first when opening the file,
# so make it actually useful.
header = """
/*
 * solver.h — C FFI for the poker-solver local GTO solver.
 *
 * This header is GENERATED by cbindgen from
 *   crates/solver-ffi/src/lib.rs
 * Do NOT edit it by hand — run `cargo build -p solver-ffi` to regenerate.
 *
 * --------------------------------------------------------------------
 * Intended consumer: ~/Desktop/Poker Panel/ (macOS Swift app).
 *
 * Linking from Swift:
 *   - Add libsolver_ffi.a (static) or libsolver_ffi.dylib (dynamic) to
 *     the Xcode target.
 *   - Include this header via a bridging header, or import it with
 *     @_silgen_name for per-symbol shims.
 *   - See crates/solver-ffi/examples/swift-harness/ for a minimal
 *     swiftc invocation that exercises the whole path.
 *
 * Lifecycle:
 *   1. SolverHandle *h = solver_new();
 *   2. (loop) solver_solve(h, &in, &out) or solver_lookup_cached(&in, &out);
 *   3. solver_free(h);
 *
 * Return codes (see `SolverStatus` enum):
 *    0  Ok
 *    1  CacheMiss   — caller may fall back to solver_solve()
 *   -1  InvalidInput
 *   -2  InternalError (a Rust panic was caught at the FFI boundary)
 *   -3  OutputTooSmall
 *
 * Concurrency:
 *   - Each SolverHandle is single-threaded. For concurrent callers
 *     allocate one handle per thread.
 *   - solver_lookup_cached() is thread-safe (pure lookup, no handle).
 *   - solver_version() is thread-safe and returns a static string —
 *     do not free it.
 *
 * ABI stability:
 *   - The layout of HandState and SolveResult is part of the contract.
 *     Any change here is a BREAKING change to Poker Panel and bumps the
 *     solver major version. Use solver_version() on the consumer side
 *     to verify a match at startup.
 */
"""

# Trailer after all generated decls. Empty for now.
trailer = ""

# Sort symbols so diffs are stable across regenerations.
sort_by = "Name"

# Disable automatic C99-style enums; we want explicit integer values
# for ABI stability.
style = "both"

# Document what every public symbol does. cbindgen picks up /// comments
# on `pub` items and emits them above the C decl.
documentation = true
documentation_style = "c"

# Rust types we want mapped to portable C types.
[export]
# Explicit opt-in: only re-export these. Keeps cruft out of the header.
include = [
    "SolverHandle",
    "HandState",
    "SolveResult",
    "SolverStatus",
]

[export.rename]
# Rust types use the same names on the C side — no renaming.

[enum]
# Emit `SolverStatus` as a C `enum`. The `#[repr(i32)]` on the Rust side
# locks the underlying integer width so values match on both sides.
prefix_with_name = false
rename_variants = "None"

[parse]
# Only parse the solver-ffi crate itself. We don't want private
# `solver-core` / `solver-nlhe` types leaking into the C header.
parse_deps = false

[parse.expand]
# No macro expansion needed — the FFI surface is all plain `#[repr(C)]`.
crates = []
